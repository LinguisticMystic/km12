services:
  app:
    build:
      context: .
      target: app
    image: km12-app:latest
    pull_policy: never
    restart: unless-stopped
    volumes:
      - ./.env:/var/www/html/.env:ro
      - ./storage:/var/www/html/storage
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: .
      target: web
    image: km12-web:latest
    pull_policy: never
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - app
    networks:
      - internal

  scheduler:
    build:
      context: .
      target: app
    image: km12-app:latest
    pull_policy: never
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - ./.env:/var/www/html/.env:ro
      - ./storage:/var/www/html/storage
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-km12}
      MYSQL_USER: ${DB_USERNAME:-km12}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-$DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - internal

networks:
  internal:

volumes:
  mysql_data:
