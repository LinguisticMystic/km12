# Merge with: docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
# Requires external Docker network "traefik" (see /home/aija/projects/traefik/README.md).
# Set in .env: TRAEFIK_HOST, TRAEFIK_ROUTER_NAME (unique per site on this server).

services:
  web:
    networks:
      traefik:
    ports: !reset []
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.${TRAEFIK_ROUTER_NAME}.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.routers.${TRAEFIK_ROUTER_NAME}.entrypoints=websecure
      - traefik.http.routers.${TRAEFIK_ROUTER_NAME}.tls.certresolver=letsencrypt
      - traefik.http.services.${TRAEFIK_ROUTER_NAME}.loadbalancer.server.port=80

networks:
  traefik:
    external: true
